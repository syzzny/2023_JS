<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        for(i=10;i>0;i--){
            document.write("2*"+i+"="+(2*i)+"<br>");
        }

        // 1이 아닌 값을 증가 감소할때
        for (let i=0; i<10; i+=3){
            document.write(`<p>${i}</p>`)
        }
        document.write("<hr>")
        //for문과 배열
        // in: 배열의 요소갯수 만큼 반복
        let numbers = ["일","이","삼"];
        for(i in numbers){
            //i의값은 인덱스의 값
            document.write(`${i}`);
            // numbers[인덱스]를 통해 배열안의 값을 가져올 수 있다.
            document.write(`<p>${numbers[i]}</p>`);
        }
        document.write(`<p>배열의 길이: ${numbers.length}</p>`);

        // 배열의 길이로 반복
        // 1. 반복횟수: 배열의 길이(배열.length)
        // 2. 초기값: 0, 증가(++), 조건식: i<배열.length
        for(let i=0; i<numbers.length; i++){
            document.write(`<p>${i}</p>`);
            document.write(`<p>${numbers[i]}</p>`);
        }
        document.write("<hr>")
        // of: 배열의 값을 가져와서 반복
        for(number of numbers){
            document.write(`<p>${number}</p>`);
        }

        /* 배열과 반복문 */
        let scores=[20,40,50,60,70];
        //in-index
        for(i in scores){
            document.write(`<p>${scores[i]}</p>`);
            // 조건문: 변수(scores[i]), 조건식(>=60)
            if(scores[i]>=60){
                document.write(`<p>${scores[i]}점 합격</p>`);
            }
            else{
                document.write("불합격");
            }
        }
        document.write("<hr>");
        for(let i=0; i<scores.length; i++){
            // 조건문: 변수(scores[i]), 조건식(>=60)
            if(scores[i]>=60){
                document.write(`<p>${scores[i]}점 합격</p>`);
            }
            else{
                document.write(`<p>불합격</p>`);
            }
        }
        // 3)of - 배열안의 값
        for(score of scores){
            document.write(`<p>${score}</p>`);
            if(score>=60){
                document.write(`<p>${score}점 합격</p>`);
            }
            else{
                document.write(`<p>불합격</p>`)
            }
        }
        /*배열의 반복문의 in과 of의 차이*/
        // in 인덱스를 사용: 배열의 각 값에 직접접근
        // of 값을 할당받아옴: 배열의 값에 직접 접근 X 

        let students = ["홍길동", "장발장"];
        students = "성춘향";
        document.write(`<p>${students}</p>`);
        for(student of students){
            student = "이름 없음";
        }
        document.write(`<p>${students}</p>`);
        for(let i in students){
            // 배열 안의 값을 수정
            students[i]="이름 없음"
        }
        document.write(`<p>${students}</p>`);
    </script>
</body>
</html>
